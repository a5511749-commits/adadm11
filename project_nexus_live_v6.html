        /* 滿版 CRT 掃描線遮罩 */
        .crt-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.35) 50%);
            z-index: 2;
            background-size: 100% 5px;
            pointer-events: none;
            opacity: 0.4;
        }

        /* ======= 漂浮能量粒子系統 (完美呼應披風飄發散的像素能量) ======= */
        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: var(--neon-purple);
            box-shadow: 0 0 8px var(--neon-purple), 0 0 15px var(--neon-magenta);
            border-radius: 2px;
            opacity: 0;
            animation: floatParticle 8s linear infinite;
        }

        /* 頂部導覽 */
        header {
            position: absolute;
            top: 0; left: 0; width: 100%;
            padding: 25px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            font-weight: 900;
            font-size: 1.3rem;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--neon-magenta);
        }
        
        .logo span {
            color: var(--neon-cyan);
        }

        .system-status {
            color: var(--neon-cyan);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 14px;
            border: 1px solid rgba(0, 240, 255, 0.25);
            border-radius: 4px;
        }

        .blink-dot {
            width: 7px;
            height: 7px;
            background-color: var(--neon-cyan);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--neon-cyan);
            animation: blink 1.2s infinite;
        }

        /* ======= 左右兩側數據面板 ======= */
        .side-panel {
            width: 230px;
            height: 60vh;
            background: rgba(10, 3, 22, 0.25);
            border: 1px solid rgba(182, 36, 255, 0.12);
            border-radius: 8px;
            padding: 20px;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 4;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            opacity: 0.85;
        }

        .side-panel h3 {
            font-size: 0.8rem;
            color: var(--neon-cyan);
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.15);
            padding-bottom: 6px;
            margin-bottom: 12px;
        }

        .panel-data-row {
            margin-bottom: 10px;
            font-size: 0.75rem;
            color: #a496c7;
        }

        .panel-data-row span {
            color: var(--neon-magenta);
            float: right;
        }

        .cyber-progress-bar {
            width: 100%;
            height: 5px;
            background: rgba(0,0,0,0.6);
            border-radius: 3px;
            margin-top: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan));
        }

        .matrix-log {
            font-family: monospace;
            font-size: 0.65rem;
            color: rgba(57, 255, 20, 0.6);
            line-height: 1.4;
            overflow: hidden;
            height: 100px;
        }

        /* ======= 中央主登入卡片 (完美高透、窄版，完全不擋主視覺) ======= */
        .login-container {
            background: var(--panel-bg);
            border: 1px solid rgba(182, 36, 255, 0.25);
            padding: 30px 25px;
            width: 100%;
            max-width: 320px;
            position: relative;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            border-radius: 10px;
            z-index: 5;
            margin: 0 auto;
            margin-top: -60px;
        }

        .level-tag {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            border: 1px solid var(--neon-magenta);
            color: var(--neon-magenta);
            padding: 3px 12px;
            font-family: 'Press Start 2P', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 1px;
            animation: pulse 2s infinite;
        }

        h2 {
            font-size: 1.35rem;
            text-align: center;
            margin-top: 5px;
            margin-bottom: 4px;
            letter-spacing: 2px;
            font-weight: 900;
            text-shadow: 0 0 8px var(--neon-purple);
        }

        .subtitle {
            color: #b0a2cf;
            text-align: center;
            font-size: 0.75rem;
            margin-bottom: 22px;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--neon-cyan);
            margin-bottom: 6px;
            font-weight: 700;
        }

        .input-group input {
            width: 100%;
            background: rgba(5, 1, 15, 0.75);
            border: 1px solid rgba(182, 36, 255, 0.2);
            border-radius: 6px;
            padding: 10px 12px;
            color: #fff;
            font-family: var(--cyber-font);
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--neon-magenta);
            box-shadow: 0 0 12px rgba(255, 0, 255, 0.4);
        }

        .cyber-btn {
            width: 100%;
            background: linear-gradient(135deg, #6a1b9a, var(--neon-purple));
            border: none;
            border-radius: 6px;
            color: #ffffff;
            padding: 12px;
            font-family: var(--cyber-font);
            font-size: 1rem;
            font-weight: 900;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .cyber-btn:hover {
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-magenta));
            box-shadow: 0 0 18px rgba(255, 0, 255, 0.6);
        }

        .footer-decor {
            text-align: center;
            margin-top: 15px;
            font-family: 'Press Start 2P', sans-serif;
            font-size: 0.55rem;
            color: rgba(182, 36, 255, 0.4);
        }

        /* 響應式 */
        @media (max-width: 1100px) {
            .side-panel {
                display: none;
            }
            body {
                justify-content: center;
                padding: 0 20px;
            }
        }

        /* ======= 動態特效定義 ======= */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 10px var(--neon-magenta); }
            50% { box-shadow: 0 0 18px #ff00ff; }
        }

        /* 模擬披風隨風大幅度飄逸動態、帶點波浪與縮放感 */
        @keyframes capeWind {
            0% {
                transform: scale(1) skewX(0deg) translateY(0px);
                filter: brightness(1);
            }
            50% {
                transform: scale(1.02) skewX(-0.8deg) translateY(-4px);
                filter: brightness(1.1) drop-shadow(0 0 15px rgba(182, 36, 255, 0.2));
            }
            100% {
                transform: scale(0.99) skewX(0.5deg) translateY(2px);
                filter: brightness(0.95);
            }
        }

        /* 能量粒子往左上方與右上方發散飄動的效果 */
        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) translateX(0) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.4;
            }
            100% {
                transform: translateY(-10vh) translateX(calc(var(--x-drift, 40px))) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <!-- 背景圖容器 (自帶披風動態風吹動畫) -->
    <div class="bg-container"></div>
    <div class="crt-overlay"></div>

    <!-- 粒子發散特效 -->
    <div class="particles" id="particle-container"></div>

    <header>
        <div class="logo">PROJECT <span>NEXUS</span></div>
        <div class="system-status">
            <div class="blink-dot"></div>
            <span>系統防禦層: ACTIVE</span>
        </div>
    </header>

    <!-- 左側數據面板 -->
    <div class="side-panel">
        <div>
            <h3>專案狀態 // STATUS</h3>
            <div class="panel-data-row">當前關卡 <span>LV. 04</span></div>
            <div class="panel-data-row">網路同步率 <span>99.9%</span></div>
            <div class="panel-data-row">動態風切引擎 <span>ONLINE</span></div>
        </div>
        <div>
            <h3>工作流進度</h3>
            <div class="panel-data-row">原畫世界觀設定
                <div class="cyber-progress-bar"><div class="progress-fill" style="width: 100%;"></div></div>
            </div>
            <div class="panel-data-row">動態矩陣視覺
                <div class="cyber-progress-bar"><div class="progress-fill" style="width: 75%;"></div></div>
            </div>
        </div>
    </div>

    <!-- 中央主登入卡片 -->
    <div class="login-container">
        <div class="level-tag">LEVEL UP</div>
        <h2>存取控制終端</h2>
        <div class="subtitle">請輸入憑證以解鎖專案工作區</div>
        
        <form onsubmit="event.preventDefault(); alert('矩陣解鎖成功！風切動態工作區載入中...');">
            <div class="input-group">
                <label>使用者帳號 / 信箱</label>
                <input type="email" placeholder="ENTER YOUR EMAIL" required>
            </div>
            
            <div class="input-group">
                <label>專案存取金鑰 / ACCESS TOKEN</label>
                <input type="password" placeholder="••••••••••••" required>
            </div>
            
            <button type="submit" class="cyber-btn">
                初始化系統核心
            </button>
        </form>

        <div class="footer-decor">READY PLAYER ONE</div>
    </div>

    <!-- 右側數據面板 -->
    <div class="side-panel">
        <div>
            <h3>安全審計 // AUDIT</h3>
            <div class="panel-data-row">節點協定 <span>TLS 1.3</span></div>
            <div class="panel-data-row">動態骨骼綁定 <span>ACTIVE</span></div>
        </div>
        <div>
            <h3>實時動態渲染日誌</h3>
            <div class="matrix-log">
                > WIND_ENGINE: ACTIVE<br>
                > CAPE_WAVE_SPEED: 6s<br>
                > PARTICLE_COUNT: 25<br>
                > AWAITING AUTH...
            </div>
        </div>
    </div>

    <!-- 自動生成浮動像素粒子的簡單腳本 -->
    <script>
        const container = document.getElementById('particle-container');
        const colors = ['#b624ff', '#ff00ff', '#00f0ff'];
        
        for (let i = 0; i < 25; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            // 隨機尺寸與位置
            const size = Math.random() * 5 + 2;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}vw`;
            
            // 隨機動畫延遲與速度
            particle.style.animationDuration = `${Math.random() * 4 + 5}s`;
            particle.style.animationDelay = `${Math.random() * 5}s`;
            particle.style.setProperty('--x-drift', `${(Math.random() * 160 - 80)}px`);
            particle.style.background = colors[Math.floor(Math.random() * colors.length)];
            
            container.appendChild(particle);
        }
    </script>

</body>
</html>
